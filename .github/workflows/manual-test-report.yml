name: Manual Email Test

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: manual-test-astro-report
  cancel-in-progress: false

jobs:
  run-manual-email-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send a manual test email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          REPORT_RECIPIENT_EMAIL: ${{ secrets.REPORT_RECIPIENT_EMAIL }}
        run: |
          python - <<'PY'
          import datetime as dt

          from scripts.send_email_resend import send_digest_email

          now = dt.datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")
          subject = f"[astroReport] Manual Email Test - {now}"
          html = (
              "<h2>astroReport 邮件测试</h2>"
              f"<p>触发时间：{now}</p>"
              "<p>如果你收到这封邮件，说明 Resend 凭据、发件域名和收件配置可用。</p>"
          )

          ok = send_digest_email(
              api_key="${{ secrets.RESEND_API_KEY }}",
              from_email="${{ secrets.RESEND_FROM_EMAIL }}",
              to_email="${{ secrets.REPORT_RECIPIENT_EMAIL }}",
              subject=subject,
              html_body=html,
          )

          if not ok:
              raise SystemExit("manual email test failed")

          print("manual email test sent")
          PY