name: Manual Email Test

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: manual-test-astro-report
  cancel-in-progress: false

jobs:
  run-manual-email-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send a manual test email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          import urllib.error
          import urllib.request

          resend_api_key = os.getenv("RESEND_API_KEY", "")
          from_email = os.getenv("RESEND_FROM_EMAIL", "")

          with open("config/config.json", "r", encoding="utf-8") as f:
            cfg = json.load(f)
          to_emails = cfg.get("mail_list", [])

          missing = [
            key for key, value in {
              "RESEND_API_KEY": resend_api_key,
              "RESEND_FROM_EMAIL": from_email,
            }.items() if not value
          ]
          if missing:
            raise SystemExit(f"missing required env: {', '.join(missing)}")
          if not to_emails:
            raise SystemExit("mail_list is empty in config/config.json")

          now = dt.datetime.now(dt.UTC).strftime("%Y-%m-%d %H:%M:%S UTC")
          subject = f"[astroReport] Manual Email Test - {now}"
          html = (
              "<h2>astroReport 邮件测试</h2>"
              f"<p>触发时间：{now}</p>"
              "<p>如果你收到这封邮件，说明 Resend 凭据、发件域名和收件配置可用。</p>"
          )

          payload = {
            "from": from_email,
            "to": to_emails,
            "subject": subject,
            "html": html,
          }
          req = urllib.request.Request(
            "https://api.resend.com/emails",
            data=json.dumps(payload).encode("utf-8"),
            headers={
              "Content-Type": "application/json",
                "Accept": "application/json",
                "User-Agent": "astroReport-mail-test/1.0 (+github-actions)",
              "Authorization": f"Bearer {resend_api_key}",
            },
            method="POST",
          )

          try:
            with urllib.request.urlopen(req, timeout=30) as resp:
              body = resp.read().decode("utf-8", errors="replace")
              print(f"resend_status={resp.status}")
              print(f"resend_response={body}")
          except urllib.error.HTTPError as e:
            body = e.read().decode("utf-8", errors="replace")
            print(f"resend_status={e.code}")
            print(f"resend_response={body}")
            raise SystemExit("manual email test failed")
          except Exception as e:
            print(f"resend_error={type(e).__name__}: {e}")
            raise SystemExit("manual email test failed")

          print("manual email test sent")
          PY